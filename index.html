                        React.createElement("div", {style:{fontWeight:800,fontSize:16,color:"#222"}}, c.cliente),
                        React.createElement("div", {style:{fontSize:13,color:"#888"}}, `🕐 ${c.hora} · ✂️ ${c.servicio}`),
                        React.createElement("div", {style:{fontSize:12,color:"#aaa",marginTop:2}}, `👩 ${c.estilista}`),
                        c.nota && React.createElement("div", {style:{fontSize:11,color:"#bbb",marginTop:3,fontStyle:"italic"}}, `📝 "${c.nota}"`),
                        c.alergias && React.createElement("div", {style:{fontSize:11,color:"#e08080",marginTop:2}}, `⚠️ ${c.alergias}`)
                      ),
                      React.createElement("div", {style:{display:"flex",flexDirection:"column",gap:5,alignItems:"flex-end",marginLeft:10,flexShrink:0}},
                        est !== "cancelada" && React.createElement("a", {href:waMsg(c), target:"_blank", rel:"noreferrer", style:{background:"#25d366",color:"#fff",borderRadius:20,padding:"5px 10px",fontSize:11,textDecoration:"none",fontWeight:600}}, "📲 WA"),
                        est === "pendiente" && React.createElement("button", {onClick:()=>cambiarEstado(c.id,"confirmada"), style:{background:"#d4edda",color:"#27ae60",border:"none",borderRadius:20,padding:"5px 10px",fontSize:11,cursor:"pointer",fontWeight:700}}, "✅"),
                        est !== "cancelada" && React.createElement("button", {onClick:()=>cambiarEstado(c.id,"cancelada"), style:{background:"#f8d7da",color:"#c0392b",border:"none",borderRadius:20,padding:"5px 10px",fontSize:11,cursor:"pointer"}}, "❌"),
                        est === "cancelada" && esAdmin && React.createElement("button", {onClick:()=>cambiarEstado(c.id,"pendiente"), style:{background:"#fff3cd",color:"#856404",border:"none",borderRadius:20,padding:"5px 10px",fontSize:11,cursor:"pointer"}}, "↩️"),
                        React.createElement("button", {onClick:()=>{setForm({...c});setEditId(c.id);setVista("nueva");}, style:{background:"#f0dede",color:"#c9878a",border:"none",borderRadius:20,padding:"5px 10px",fontSize:11,cursor:"pointer"}}, "✏️"),
                        esAdmin && React.createElement("button", {onClick:async()=>{if(confirm("¿Eliminar?"))await deleteDoc(doc(db,"citas",c.id));}, style:{background:"#fdf0f0",color:"#e08080",border:"none",borderRadius:20,padding:"5px 10px",fontSize:11,cursor:"pointer"}}, "🗑️")
                      )
                    )
                  )
                );
              })
            )
        ),

        // Tab Clientas
        vista === "agenda" && tab === "clientas" && React.createElement("div", {style:{padding:14}},
          React.createElement("input", {placeholder:"🔍 Buscar clienta...", value:busqueda, onChange:e=>setBusqueda(e.target.value), style:{width:"100%",padding:"10px 14px",borderRadius:12,border:"1px solid #e8c8c8",fontSize:13,boxSizing:"border-box",background:"#fff",marginBottom:12}}),
          ...(busqueda.length > 1 ? clientasBusq : clientas).map((cl,i) =>
            React.createElement("div", {key:i, onClick:()=>setDetalleClienta(cl), style:{background:"#fff",borderRadius:14,padding:"12px 14px",marginBottom:8,boxShadow:"0 2px 8px #e8c8c820",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}},
              React.createElement("div", null,
                React.createElement("div", {style:{fontWeight:700,color:"#333",fontSize:14}}, cl.nombre + (cl.frecuente?" ⭐":"")),
                React.createElement("div", {style:{fontSize:12,color:"#aaa"}}, `${cl.tel} · ${cl.visitas.length} visita${cl.visitas.length!==1?"s":""}`)
              ),
              esAdmin && React.createElement("div", {style:{fontSize:13,color:"#27ae60",fontWeight:700}}, `Q${cl.visitas.filter(v=>v.estado!=="cancelada").reduce((s,v)=>s+(Number(v.precio)||0),0)}`)
            )
          )
        ),

        // Tab Reportes (solo admin)
        vista === "agenda" && tab === "reportes" && esAdmin && React.createElement("div", {style:{padding:14}},
          React.createElement("div", {style:{background:"linear-gradient(135deg,#c9878a,#e8b4b8)",borderRadius:16,padding:"18px 20px",color:"#fff",marginBottom:14,textAlign:"center"}},
            React.createElement("div", {style:{fontSize:12,opacity:0.85}}, "Total generado"),
            React.createElement("div", {style:{fontSize:36,fontWeight:800,marginTop:4}}, `Q${citas.filter(c=>c.estado!=="cancelada").reduce((s,c)=>s+(Number(c.precio)||0),0)}`),
            React.createElement("div", {style:{fontSize:12,opacity:0.85,marginTop:4}}, `${citas.filter(c=>c.estado!=="cancelada").length} citas · ${clientas.length} clientas`)
          )
        ),

        // Formulario nueva/editar cita
        vista === "nueva" && React.createElement("div", {style:{padding:16}},
          React.createElement("div", {style:{display:"flex",alignItems:"center",gap:10,marginBottom:20}},
            React.createElement("button", {onClick:()=>{setVista("agenda");setEditId(null);}, style:{background:"#f0dede",border:"none",borderRadius:20,padding:"6px 14px",color:"#c9878a",fontSize:13,cursor:"pointer",fontWeight:600}}, "← Volver"),
            React.createElement("div", {style:{fontWeight:800,fontSize:17,color:"#c9878a"}}, editId?"✏️ Editar cita":"💅 Nueva cita")
          ),
          ...[{l:"Nombre *",k:"cliente",t:"text",ph:"Ej: María López"},{l:"Teléfono WhatsApp *",k:"telefono",t:"tel",ph:"Ej: 50212345678"},{l:"Fecha *",k:"fecha",t:"date"},{l:"🎂 Cumpleaños",k:"cumpleanos",t:"date"}].map(({l,k,t,ph}) =>
            React.createElement("div", {key:k, style:{marginBottom:12}},
              React.createElement("label", {style:{fontSize:12,color:"#888",display:"block",marginBottom:4}}, l),
              React.createElement("input", {type:t, value:form[k]||"", placeholder:ph||"", onChange:e=>setForm(f=>({...f,[k]:e.target.value})), style:{width:"100%",padding:"11px 13px",borderRadius:12,border:"1px solid #e8c8c8",fontSize:14,boxSizing:"border-box",background:"#fff"}})
            )
          ),
          ...[{l:"Hora",k:"hora",opts:HORAS},{l:"Servicio",k:"servicio",opts:SERVICIOS},...(esAdmin?[{l:"Estilista",k:"estilista",opts:ESTILISTAS}]:[])].map(({l,k,opts}) =>
            React.createElement("div", {key:k, style:{marginBottom:12}},
              React.createElement("label", {style:{fontSize:12,color:"#888",display:"block",marginBottom:4}}, l),
              React.createElement("select", {value:form[k], onChange:e=>{const v=e.target.value;setForm(f=>({...f,[k]:v,...(k==="servicio"?{precio:PRECIOS_DEF[v]||0}:{})}));}, style:{width:"100%",padding:"11px 13px",borderRadius:12,border:"1px solid #e8c8c8",fontSize:14,background:"#fff"}},
                ...opts.map(o => React.createElement("option", {key:o}, o))
              )
            )
          ),
          esAdmin && React.createElement("div", {style:{marginBottom:12}},
            React.createElement("label", {style:{fontSize:12,color:"#888",display:"block",marginBottom:4}}, "💰 Precio (Q)"),
            React.createElement("input", {type:"number", value:form.precio||0, onChange:e=>setForm(f=>({...f,precio:Number(e.target.value)})), style:{width:"100%",padding:"11px 13px",borderRadius:12,border:"1px solid #e8c8c8",fontSize:14,boxSizing:"border-box",background:"#fff"}})
          ),
          ...[{l:"📝 Nota",k:"nota",ph:"Preferencias del servicio"},{l:"🎨 Fórmula",k:"formula",ph:"Ej: 7.3 + 20vol"},{l:"⚠️ Alergias",k:"alergias",ph:"Ej: alérgica a amoniaco"}].map(({l,k,ph}) =>
            React.createElement("div", {key:k, style:{marginBottom:12}},
              React.createElement("label", {style:{fontSize:12,color:"#888",display:"block",marginBottom:4}}, l),
              React.createElement("input", {type:"text", value:form[k]||"", placeholder:ph, onChange:e=>setForm(f=>({...f,[k]:e.target.value})), style:{width:"100%",padding:"11px 13px",borderRadius:12,border:"1px solid #e8c8c8",fontSize:13,boxSizing:"border-box",background:"#fff"}})
            )
          ),
          React.createElement("button", {onClick:guardar, style:{width:"100%",padding:15,background:"linear-gradient(135deg,#c9878a,#e8b4b8)",color:"#fff",border:"none",borderRadius:14,fontSize:16,fontWeight:800,cursor:"pointer",marginTop:8}}, editId?"Guardar cambios":"💅 Guardar cita"),
          React.createElement("button", {onClick:()=>{setVista("agenda");setEditId(null);}, style:{width:"100%",padding:12,background:"none",color:"#aaa",border:"none",fontSize:14,cursor:"pointer",marginTop:8}}, "Cancelar")
        ),

        // Botón flotante
        vista === "agenda" && React.createElement("button", {onClick:()=>{setForm(defForm());setEditId(null);setVista("nueva");}, style:{position:"fixed",bottom:24,right:20,width:58,height:58,borderRadius:"50%",background:"linear-gradient(135deg,#c9878a,#e8b4b8)",color:"#fff",border:"none",fontSize:30,cursor:"pointer",boxShadow:"0 6px 20px #c9878a50",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}, "+"),

        // Modal masivo
        masivo && citaEnvio && React.createElement("div", {style:{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#00000080",zIndex:1300,display:"flex",alignItems:"center",justifyContent:"center"}},
          React.createElement("div", {style:{background:"#fff",borderRadius:20,padding:24,margin:16,width:"100%",maxWidth:420}},
            React.createElement("div", {style:{fontSize:12,color:"#aaa",marginBottom:6}}, `Enviando ${mIdx+1} de ${citasDia.length}`),
            React.createElement("div", {style:{background:"#f0dede",borderRadius:8,height:6,marginBottom:16}},
              React.createElement("div", {style:{background:"linear-gradient(90deg,#c9878a,#e8b4b8)",height:6,borderRadius:8,width:`${((mIdx+1)/citasDia.length)*100}%`}})
            ),
            React.createElement("div", {style:{fontWeight:800,fontSize:18,color:"#333"}}, citaEnvio.cliente),
            React.createElement("div", {style:{fontSize:13,color:"#888",marginTop:4}}, `${citaEnvio.hora} · ${citaEnvio.servicio} · ${citaEnvio.estilista}`),
            React.createElement("a", {href:waMsg(citaEnvio), target:"_blank", rel:"noreferrer", onClick:enviarSig, style:{display:"block",background:"#25d366",color:"#fff",borderRadius:14,padding:"14px 0",textDecoration:"none",fontWeight:700,fontSize:16,textAlign:"center",marginTop:16}}, "📲 Abrir WhatsApp y enviar"),
            React.createElement("button", {onClick:()=>{setMasivo(false);setMIdx(null);}, style:{width:"100%",padding:10,background:"none",border:"none",color:"#aaa",fontSize:13,cursor:"pointer",marginTop:8}}, "Cancelar")
          )
        )
      );
    }

    createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
