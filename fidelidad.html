<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miradas Fabulosas - Fidelidad</title>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18",
        "react-dom/client": "https://esm.sh/react-dom@18/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
  </script>
</head>
<body style="margin:0;padding:0;background:#fdf6f6;">
  <div id="root"></div>
  <script type="module">
    import React, { useState, useEffect } from "react";
    import { createRoot } from "react-dom/client";
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc } from "firebase/firestore";

    const firebaseConfig = {
      apiKey: "AIzaSyBbZvr2t9Bh7ekJCM2OP8O64Cgy6KWYDaY",
      authDomain: "miradas-fabulosas.firebaseapp.com",
      projectId: "miradas-fabulosas",
      storageBucket: "miradas-fabulosas.firebasestorage.app",
      messagingSenderId: "339425359104",
      appId: "1:339425359104:web:a0e342f5a87c3169512fe5"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);

    const ADMIN_PIN = "1234";
    const today = () => new Date().toISOString().split("T")[0];
    const fmtFecha = (f) => { if(!f) return ""; const [y,m,d]=f.split("-"); return `${d}/${m}/${y}`; };

    function App() {
      const [clientas, setClientas] = useState([]);
      const [vista, setVista] = useState("buscar");
      const [busqueda, setBusqueda] = useState("");
      const [clientaActual, setClientaActual] = useState(null);
      const [form, setForm] = useState({nombre:"",telefono:"",cumpleanos:""});
      const [toast, setToast] = useState(null);
      const [pinAdmin, setPinAdmin] = useState("");
      const [esAdmin, setEsAdmin] = useState(false);
      const [pinError, setPinError] = useState("");
      const [visitasMeta, setVisitasMeta] = useState(8);
      const [mostrarNueva, setMostrarNueva] = useState(false);
      const [mostrarAdmin, setMostrarAdmin] = useState(false);
      const [mostrarPinAdmin, setMostrarPinAdmin] = useState(false);

      useEffect(() => {
        const unsub = onSnapshot(collection(db,"fidelidad"), snap => {
          setClientas(snap.docs.map(d => ({...d.data(), id:d.id})));
        });
        return () => unsub();
      }, []);

      const showToast = (msg, color="#222") => { setToast({msg,color}); setTimeout(()=>setToast(null),3000); };

      const guardarClienta = async () => {
        if(!form.nombre||!form.telefono) { showToast("⚠️ Completa nombre y teléfono","#c0392b"); return; }
        const id = form.telefono.replace(/\D/g,"");
        await setDoc(doc(db,"fidelidad",id), {nombre:form.nombre,telefono:form.telefono,cumpleanos:form.cumpleanos||"",visitas:0,historial:[],premiosGanados:0,creadaEn:today()});
        showToast("✓ Clienta registrada 🌸","#c9878a");
        setForm({nombre:"",telefono:"",cumpleanos:""});
        setMostrarNueva(false);
      };

      const registrarVisita = async (cl) => {
        const nuevas = (cl.visitas||0) + 1;
        const gano = nuevas % visitasMeta === 0;
        const hist = [...(cl.historial||[]), {fecha:today(),premio:gano}];
        const premios = (cl.premiosGanados||0) + (gano?1:0);
        await updateDoc(doc(db,"fidelidad",cl.id), {visitas:nuevas,historial:hist,premiosGanados:premios});
        if(gano) showToast(`🎉 ¡${cl.nombre} ganó un servicio gratis!`,"#c9878a");
        else showToast(`✓ Visita registrada (${nuevas%visitasMeta}/${visitasMeta})`,"#27ae60");
        setClientaActual({...cl,visitas:nuevas,historial:hist,premiosGanados:premios});
      };

      const canjearPremio = async (cl) => {
        if(!(cl.premiosGanados||0)) return;
        await updateDoc(doc(db,"fidelidad",cl.id), {premiosGanados:(cl.premiosGanados||1)-1});
        showToast(`✓ Premio canjeado`,"#c9878a");
        setClientaActual({...cl,premiosGanados:(cl.premiosGanados||1)-1});
      };

      const verificarAdmin = () => {
        if(pinAdmin===ADMIN_PIN) { setEsAdmin(true); setMostrarAdmin(true); setMostrarPinAdmin(false); setPinError(""); }
        else { setPinError("PIN incorrecto ❌"); setPinAdmin(""); }
      };

      const hoyMD = today().slice(5);
      const cumplHoy = clientas.filter(c=>c.cumpleanos&&c.cumpleanos.slice(5)===hoyMD);
      const clientasBusq = busqueda.length>1
        ? clientas.filter(c=>c.nombre.toLowerCase().includes(busqueda.toLowerCase())||c.telefono.includes(busqueda))
        : [...clientas].sort((a,b)=>(b.visitas||0)-(a.visitas||0));

      // PERFIL CLIENTA
      if(clientaActual) {
        const cl = clientas.find(c=>c.id===clientaActual.id)||clientaActual;
        const enCiclo = (cl.visitas||0)%visitasMeta;
        const pct = (enCiclo/visitasMeta)*100;
        return React.createElement("div", {style:{fontFamily:"'Segoe UI',sans-serif",background:"#fdf6f6",minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:40}},
          toast && React.createElement("div", {style:{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:toast.color,color:"#fff",borderRadius:20,padding:"10px 22px",fontSize:13,zIndex:2000,whiteSpace:"nowrap"}}, toast.msg),
          React.createElement("div", {style:{background:"linear-gradient(135deg,#c9878a,#e8b4b8)",padding:"20px 20px 24px",color:"#fff"}},
            React.createElement("button", {onClick:()=>setClientaActual(null), style:{background:"#fff3",border:"none",color:"#fff",fontSize:13,borderRadius:20,padding:"4px 12px",cursor:"pointer",marginBottom:12}}, "← Volver"),
            React.createElement("div", {style:{display:"flex",alignItems:"center",gap:14}},
              React.createElement("div", {style:{width:56,height:56,borderRadius:"50%",background:"#fff3",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,fontWeight:700,color:"#fff"}}, cl.nombre[0]),
              React.createElement("div", null,
                React.createElement("div", {style:{fontWeight:800,fontSize:20}}, cl.nombre),
                React.createElement("div", {style:{fontSize:13,opacity:0.85}}, cl.telefono),
                cl.cumpleanos && React.createElement("div", {style:{fontSize:12,opacity:0.75}}, `🎂 ${fmtFecha(cl.cumpleanos)}`)
              )
            )
          ),
          React.createElement("div", {style:{padding:16}},
            React.createElement("div", {style:{background:"#fff",borderRadius:20,padding:20,marginBottom:14,boxShadow:"0 4px 20px #e8c8c830"}},
              React.createElement("div", {style:{fontWeight:700,fontSize:14,color:"#c9878a",marginBottom:12}}, "💅 Tarjeta de Fidelidad"),
              React.createElement("div", {style:{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16,justifyContent:"center"}},
                ...Array.from({length:visitasMeta}).map((_,i) =>
                  React.createElement("div", {key:i, style:{width:44,height:44,borderRadius:"50%",background:i<enCiclo?"linear-gradient(135deg,#c9878a,#e8b4b8)":"#f0dede",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,boxShadow:i<enCiclo?"0 2px 8px #c9878a40":"none"}},
                    i<enCiclo?"💅":"○"
                  )
                )
              ),
              React.createElement("div", {style:{background:"#f0dede",borderRadius:8,height:8,marginBottom:8}},
                React.createElement("div", {style:{background:"linear-gradient(90deg,#c9878a,#e8b4b8)",height:8,borderRadius:8,width:`${pct}%`,transition:"width 0.5s"}})
              ),
              React.createElement("div", {style:{display:"flex",justifyContent:"space-between",fontSize:12,color:"#aaa",marginBottom:16}},
                React.createElement("span", null, `${enCiclo}/${visitasMeta} visitas en este ciclo`),
                React.createElement("span", null, `${visitasMeta-enCiclo} para el premio`)
              ),
              React.createElement("div", {style:{display:"flex",gap:8,marginBottom:16}},
                ...[[(cl.visitas||0),"visitas totales","#c9878a"],[(cl.premiosGanados||0),"premios","#27ae60"],[(cl.historial||[]).length,"historial","#7bafd4"]].map(([v,l,col]) =>
                  React.createElement("div", {key:l, style:{flex:1,background:"#fdf6f6",borderRadius:12,padding:"10px 6px",textAlign:"center"}},
                    React.createElement("div", {style:{fontSize:20,fontWeight:800,color:col}}, v),
                    React.createElement("div", {style:{fontSize:10,color:"#aaa",marginTop:2}}, l)
                  )
                )
              ),
              (cl.premiosGanados||0)>0 && React.createElement("div", {style:{background:"linear-gradient(135deg,#fff8e0,#fff3cc)",borderRadius:14,padding:"12px 16px",marginBottom:14,border:"2px solid #f0a020",display:"flex",justifyContent:"space-between",alignItems:"center"}},
                React.createElement("div", null,
                  React.createElement("div", {style:{fontWeight:700,color:"#856404",fontSize:14}}, `🎁 ¡Tiene ${cl.premiosGanados} premio${cl.premiosGanados>1?"s":""}!`),
                  React.createElement("div", {style:{fontSize:12,color:"#a08040"}}, "Servicio gratis disponible")
                ),
                React.createElement("button", {onClick:()=>canjearPremio(cl), style:{background:"#f0a020",color:"#fff",border:"none",borderRadius:12,padding:"8px 14px",fontSize:12,cursor:"pointer",fontWeight:700}}, "Canjear")
              ),
              React.createElement("button", {onClick:()=>registrarVisita(cl), style:{width:"100%",padding:14,background:"linear-gradient(135deg,#c9878a,#e8b4b8)",color:"#fff",border:"none",borderRadius:14,fontSize:15,fontWeight:800,cursor:"pointer"}}, "✅ Registrar visita de hoy")
            ),
            (cl.historial||[]).length>0 && React.createElement("div", {style:{background:"#fff",borderRadius:14,padding:14,boxShadow:"0 2px 8px #e8c8c820"}},
              React.createElement("div", {style:{fontWeight:700,color:"#c9878a",marginBottom:10,fontSize:13}}, "📋 Historial"),
              ...[...(cl.historial||[])].reverse().map((h,i) =>
                React.createElement("div", {key:i, style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:i<(cl.historial||[]).length-1?"1px solid #f8f0f0":"none"}},
                  React.createElement("span", {style:{fontSize:13,color:"#555"}}, `📅 ${fmtFecha(h.fecha)}`),
                  h.premio && React.createElement("span", {style:{fontSize:11,background:"#fff8e0",color:"#856404",borderRadius:20,padding:"2px 10px",fontWeight:700}}, "🎁 ¡Premio!")
                )
              )
            )
          )
        );
      }

      return React.createElement("div", {style:{fontFamily:"'Segoe UI',sans-serif",background:"#fdf6f6",minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:80}},
        toast && React.createElement("div", {style:{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:toast.color,color:"#fff",borderRadius:20,padding:"10px 22px",fontSize:13,zIndex:2000,whiteSpace:"nowrap"}}, toast.msg),

        // Header
        React.createElement("div", {style:{background:"linear-gradient(135deg,#c9878a,#e8b4b8)",padding:"20px 20px 16px",color:"#fff"}},
          React.createElement("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
            React.createElement("div", null,
              React.createElement("div", {style:{fontSize:10,letterSpacing:3,opacity:0.8,textTransform:"uppercase"}}, "Miradas Fabulosas"),
              React.createElement("div", {style:{fontSize:22,fontWeight:800,marginTop:2}}, "💎 Fidelidad"),
              React.createElement("div", {style:{fontSize:12,opacity:0.75,marginTop:2}}, `${clientas.length} clientas registradas`)
            ),
            React.createElement("div", {style:{display:"flex",gap:6}},
              React.createElement("a", {href:"index.html", style:{background:"#fff3",border:"none",borderRadius:20,padding:"5px 12px",color:"#fff",fontSize:12,cursor:"pointer",textDecoration:"none"}}, "📅 Agenda"),
              React.createElement("button", {onClick:()=>setMostrarPinAdmin(true), style:{background:"#fff3",border:"none",borderRadius:20,padding:"5px 10px",color:"#fff",fontSize:12,cursor:"pointer"}}, "⚙️")
            )
          ),
          cumplHoy.length>0 && React.createElement("div", {style:{marginTop:8,background:"#fff3",borderRadius:10,padding:"6px 12px",fontSize:12}}, `🎂 ¡Hoy cumple: ${cumplHoy.map(c=>c.nombre).join(", ")}!`)
        ),

        // Búsqueda
        React.createElement("div", {style:{padding:14}},
          React.createElement("input", {placeholder:"🔍 Buscar clienta...", value:busqueda, onChange:e=>setBusqueda(e.target.value), style:{width:"100%",padding:"12px 16px",borderRadius:14,border:"1px solid #e8c8c8",fontSize:14,boxSizing:"border-box",background:"#fff",marginBottom:12,boxShadow:"0 2px 8px #e8c8c820"}}),

          clientasBusq.length===0 && busqueda.length>1 && React.createElement("div", {style:{textAlign:"center",padding:30,color:"#ccc"}}, "No se encontró ninguna clienta"),

          ...clientasBusq.map((cl,i) => {
            const enCiclo=(cl.visitas||0)%visitasMeta;
            const pct=(enCiclo/visitasMeta)*100;
            return React.createElement("div", {key:cl.id||i, onClick:()=>setClientaActual(cl), style:{background:"#fff",borderRadius:16,padding:"14px 16px",marginBottom:10,boxShadow:"0 2px 10px #e8c8c820",cursor:"pointer"}},
              React.createElement("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},
                React.createElement("div", {style:{display:"flex",alignItems:"center",gap:10}},
                  React.createElement("div", {style:{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,#c9878a,#e8b4b8)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:16,flexShrink:0}}, cl.nombre[0]),
                  React.createElement("div", null,
                    React.createElement("div", {style:{fontWeight:700,fontSize:15,color:"#333"}}, cl.nombre),
                    React.createElement("div", {style:{fontSize:12,color:"#aaa"}}, `${cl.visitas||0} visitas totales`)
                  )
                ),
                React.createElement("div", {style:{textAlign:"right"}},
                  (cl.premiosGanados||0)>0 && React.createElement("div", {style:{fontSize:11,background:"#fff8e0",color:"#856404",borderRadius:20,padding:"2px 10px",fontWeight:700,marginBottom:4}}, `🎁 ${cl.premiosGanados} premio${cl.premiosGanados>1?"s":""}`),
                  React.createElement("div", {style:{fontSize:11,color:"#aaa"}}, `${enCiclo}/${visitasMeta}`)
                )
              ),
              React.createElement("div", {style:{background:"#f0dede",borderRadius:6,height:6}},
                React.createElement("div", {style:{background:"linear-gradient(90deg,#c9878a,#e8b4b8)",height:6,borderRadius:6,width:`${pct}%`}})
              )
            );
          })
        ),

        // Modal nueva clienta
        mostrarNueva && React.createElement("div", {style:{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#00000070",zIndex:500,display:"flex",alignItems:"flex-end"}},
          React.createElement("div", {style:{background:"#fff",borderRadius:"24px 24px 0 0",padding:24,width:"100%",maxWidth:480,margin:"0 auto"}},
            React.createElement("div", {style:{fontWeight:800,fontSize:17,color:"#c9878a",marginBottom:16}}, "➕ Nueva clienta"),
            ...[{l:"Nombre *",k:"nombre",t:"text",ph:"Ej: María López"},{l:"Teléfono *",k:"telefono",t:"tel",ph:"Ej: 50212345678"},{l:"🎂 Cumpleaños",k:"cumpleanos",t:"date"}].map(({l,k,t,ph})=>
              React.createElement("div", {key:k, style:{marginBottom:12}},
                React.createElement("label", {style:{fontSize:12,color:"#888",display:"block",marginBottom:4}}, l),
                React.createElement("input", {type:t, value:form[k]||"", placeholder:ph||"", onChange:e=>setForm(f=>({...f,[k]:e.target.value})), style:{width:"100%",padding:"11px 13px",borderRadius:12,border:"1px solid #e8c8c8",fontSize:14,boxSizing:"border-box",background:"#fff"}})
              )
            ),
            React.createElement("button", {onClick:guardarClienta, style:{width:"100%",padding:14,background:"linear-gradient(135deg,#c9878a,#e8b4b8)",color:"#fff",border:"none",borderRadius:14,fontSize:15,fontWeight:800,cursor:"pointer",marginTop:8}}, "💅 Registrar clienta"),
            React.createElement("button", {onClick:()=>setMostrarNueva(false), style:{width:"100%",padding:12,background:"none",color:"#aaa",border:"none",fontSize:14,cursor:"pointer",marginTop:8}}, "Cancelar")
          )
        ),

        // Modal PIN admin
        mostrarPinAdmin && React.createElement("div", {style:{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#00000070",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center"}},
          React.createElement("div", {style:{background:"#fff",borderRadius:20,padding:24,margin:20,textAlign:"center",maxWidth:300,width:"100%"}},
            React.createElement("div", {style:{fontSize:32,marginBottom:8}}, "🔐"),
            React.createElement("div", {style:{fontWeight:700,fontSize:16,marginBottom:4}}, "Acceso Admin"),
            React.createElement("input", {type:"password", value:pinAdmin, onChange:e=>setPinAdmin(e.target.value), placeholder:"PIN", style:{width:"100%",padding:"12px",borderRadius:12,border:"1px solid #e8c8c8",fontSize:16,textAlign:"center",letterSpacing:8,boxSizing:"border-box",marginTop:12}}),
            pinError && React.createElement("div", {style:{color:"#c0392b",fontSize:13,marginTop:6}}, pinError),
            React.createElement("button", {onClick:verificarAdmin, style:{width:"100%",padding:12,background:"linear-gradient(135deg,#c9878a,#e8b4b8)",color:"#fff",border:"none",borderRadius:12,fontWeight:700,cursor:"pointer",marginTop:12}}, "Entrar"),
            React.createElement("button", {onClick:()=>setMostrarPinAdmin(false), style:{width:"100%",padding:10,background:"none",border:"none",color:"#aaa",fontSize:13,cursor:"pointer",marginTop:6}}, "Cancelar")
          )
        ),

        // Panel admin
        mostrarAdmin && esAdmin && React.createElement("div", {style:{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#fdf6f6",zIndex:600,overflowY:"auto"}},
          React.createElement("div", {style:{background:"linear-gradient(135deg,#c9878a,#e8b4b8)",padding:"20px 20px 16px",color:"#fff"}},
            React.createElement("button", {onClick:()=>setMostrarAdmin(false), style:{background:"#fff3",border:"none",color:"#fff",fontSize:13,borderRadius:20,padding:"4px 12px",cursor:"pointer",marginBottom:10}}, "← Volver"),
            React.createElement("div", {style:{fontWeight:800,fontSize:20}}, "⚙️ Panel Admin")
          ),
          React.createElement("div", {style:{padding:16}},
            React.createElement("div", {style:{background:"#fff",borderRadius:14,padding:16,marginBottom:14,boxShadow:"0 2px 8px #e8c8c820"}},
              React.createElement("div", {style:{fontWeight:700,color:"#c9878a",marginBottom:12}}, "⚙️ Visitas para premio"),
              React.createElement("div", {style:{display:"flex",gap:8}},
                ...[5,6,7,8,9,10].map(n=>
                  React.createElement("button", {key:n, onClick:()=>setVisitasMeta(n), style:{flex:1,padding:"10px 0",background:visitasMeta===n?"linear-gradient(135deg,#c9878a,#e8b4b8)":"#f0dede",color:visitasMeta===n?"#fff":"#c9878a",border:"none",borderRadius:10,fontWeight:700,cursor:"pointer",fontSize:14}}, n)
                )
              )
            ),
            React.createElement("div", {style:{background:"#fff",borderRadius:14,padding:16,boxShadow:"0 2px 8px #e8c8c820"}},
              React.createElement("div", {style:{fontWeight:700,color:"#c9878a",marginBottom:12}}, "👑 Top clientas"),
              ...[...clientas].sort((a,b)=>(b.visitas||0)-(a.visitas||0)).slice(0,10).map((cl,i)=>
                React.createElement("div", {key:cl.id, style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<9?"1px solid #f8f0f0":"none"}},
                  React.createElement("div", {style:{display:"flex",alignItems:"center",gap:8}},
                    React.createElement("span", {style:{fontWeight:800,color:"#c9878a",width:24}}, i===0?"👑":i===1?"🥈":i===2?"🥉":`${i+1}.`),
                    React.createElement("div", null,
                      React.createElement("div", {style:{fontWeight:600,fontSize:13,color:"#333"}}, cl.nombre),
                      (cl.premiosGanados||0)>0 && React.createElement("div", {style:{fontSize:11,color:"#856404"}}, `🎁 ${cl.premiosGanados} premio${cl.premiosGanados>1?"s":""}`)
                    )
                  ),
                  React.createElement("div", {style:{fontWeight:700,color:"#c9878a",fontSize:14}}, `${cl.visitas||0} visitas`)
                )
              )
            )
          )
        ),

        // FAB
        React.createElement("button", {onClick:()=>setMostrarNueva(true), style:{position:"fixed",bottom:24,right:20,width:58,height:58,borderRadius:"50%",background:"linear-gradient(135deg,#c9878a,#e8b4b8)",color:"#fff",border:"none",fontSize:30,cursor:"pointer",boxShadow:"0 6px 20px #c9878a50",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}, "+")
      );
    }

    createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
